name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test-geometry:
    name: Test geometry service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install geometry dependencies
        working-directory: geometry
        run: |
          pip install --upgrade pip
          pip install fastapi==0.115.0 uvicorn pydantic==2.9.0 shapely==2.0.6 \
            numpy==2.1.0 ezdxf==1.3.4 reportlab==4.2.0 \
            pytest pytest-asyncio httpx

      - name: Run geometry tests
        working-directory: geometry
        run: pytest tests/ -v

  deploy-geometry:
    name: Deploy geometry service to Fly.io
    runs-on: ubuntu-latest
    needs: test-geometry
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: geometry
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy web app to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web app
        working-directory: web
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: web
          vercel-args: "--prod"
