# fly.toml app configuration file generated for carvacoustic-geometry on 2026-03-27T13:38:26-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'carvacoustic-geometry'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
